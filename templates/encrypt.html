<!DOCTYPE html>
<html>
<head>
<title>Encrypt Message - Cryptic Layers</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ====== SOURCE CODE FOR ENCRYPT PAGE UI ====== */

body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f1f5f9;   
    color: #0f172a;
}

/* HEADER */
header {
    background: white;
    padding: 22px;
    text-align: center;
    font-size: 44px;
    font-weight: bold;
    border-bottom: 1px solid #e2e8f0;
}

/* CONTAINER */
.container {
    max-width: 700px;
    margin: 60px auto;
    padding: 20px;
}

/* CARD */
.card {
    background: #e5e7eb;  
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

/* TITLE */
h2 {
    margin-bottom: 12px;
}

.subtitle {
    color: #475569;
    margin-bottom: 25px;
    font-size: 17px;
}

/* INPUTS */
label {
    display: block;
    margin-top: 15px;
    margin-bottom: 5px;
    font-size: 17px;
}

/* INPUT STYLE */
textarea,
input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    background: white;    
    color: black;
    font-size: 16px;
    box-sizing: border-box;
}

/* PASSWORD CONTAINER */
.password-container {
    position: relative;
}

/* EYE BUTTON */
.toggle-eye {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #64748b;
    font-size: 18px;
}

/* FILE INPUT */
input[type="file"] {
    background: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 18px;
    margin-top: 25px;
    border: none;
    border-radius: 15px;
    font-weight: bold;
    font-size: 15px;
    background: #2563eb;   
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #1d4ed8;
}

/* BACK BUTTON */
.back {
    margin-top: 17px;
    background: #64748b;
}

.back:hover {
    background: #475569;
}

/* MESSAGE */
.message {
    margin-top: 15px;
    padding: 10px;
    border-radius: 8px;
    background: #f8fafc;
    font-size: 21px;
}

.success {
    color: #16a34a;
}

.error {
    color: #dc2626;
}
</style>

</head>

<body>

<header>Cryptic Layers</header>

<div class="container">
<div class="card">

<h2>
<i class="fa-solid fa-lock"></i>
1. Encrypt & Hide
</h2>

<p class="subtitle">
Encrypt your message using Blowfish and conceal it inside an image using LSB.
</p>

<form method="POST" enctype="multipart/form-data">

<label>Secret Message</label>
<textarea name="plaintext" rows="5" required></textarea>

<label>Secret Key</label>

<div class="password-container">
<input
    type="password"
    name="key"
    id="secretKey"
    required
>

<i
    class="fa-solid fa-eye toggle-eye"
    onclick="togglePassword()"
    id="eyeIcon"
></i>
</div>

<label>Select Cover Image</label>
<input type="file" name="image" required>

<button type="submit">
Embed Data & Download Stego Image
</button>

</form>

{% if message %}
<div class="message success">
{{ message }}
</div>
{% endif %}

{% with messages = get_flashed_messages() %}
{% if messages %}
{% for msg in messages %}
<div class="message error">
{{ msg }}
</div>
{% endfor %}
{% endif %}
{% endwith %}

<button class="back" onclick="location.href='/'">
← Back to Home
</button>

</div>
</div>

<script>
function togglePassword() {

    var passwordField =
    document.getElementById("secretKey");

    var eyeIcon =
    document.getElementById("eyeIcon");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    }
    else {
        passwordField.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }

}
</script>

</body>
</html>
